name: 每日时尚情报更新

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-intel:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 抓取今日时尚情报
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node generate.js
      - name: 提交并推送
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Fashion Intel Bot"
          git add news-data.json
          git diff --staged --quiet || git commit -m "📰 时尚情报更新 $(date +'%Y-%m-%d')"
          git push
